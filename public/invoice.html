<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice | Fritz's Detail on the Go</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#7B2FBE;--purple-light:#9B4FDE;--black:#0A0A0A;--card:#1A1A1A;--white:#FFF;--gray:#999;--gray-light:#CCC;--border:rgba(123,47,190,.25)}
body{background:var(--black);color:var(--white);font-family:'Open Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.panel{max-width:620px;background:var(--card);border:1px solid var(--border);padding:32px}
.kicker{font-family:'Rajdhani',sans-serif;color:var(--purple-light);font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:13px;margin-bottom:10px}
h1{font-family:'Oswald',sans-serif;font-size:44px;line-height:1;text-transform:uppercase;margin-bottom:14px}
p{color:var(--gray-light);line-height:1.7;margin-bottom:18px}
.actions{display:flex;flex-wrap:wrap;gap:12px}
a{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);padding:12px 16px;color:#fff;text-decoration:none;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.4px;text-transform:uppercase}
a.primary{background:var(--purple);border-color:var(--purple)}
</style>
</head>
<body>
<main class="panel">
  <div class="kicker">Invoice flow updated</div>
  <h1>Start With Checkout</h1>
  <p>Customer invoices now start from the service checkout flow. Fritz reviews and adds any distance, condition, or extra labor fees after the booking when needed.</p>
  <div class="actions">
    <a class="primary" href="/checkout.html">Start Checkout</a>
    <a href="tel:+12762470921">Call Fritz</a>
    <a href="/">Back To Site</a>
  </div>
</main>
<script src="/site-shared.js"></script>
</body>
</html>
